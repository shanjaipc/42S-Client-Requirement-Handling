[server]
# Prevent Streamlit from showing file uploader warnings
maxUploadSize = 10

[browser]
# Disable usage stats telemetry
gatherUsageStats = false

[theme]
base = "light"
font = "sans serif"
primaryColor = "#374151"
textColor = "#1f2937"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f0f2f6"
