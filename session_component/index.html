<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body>
<script>
(function () {
  const KEY = "42s_sid";

  function send(type, payload) {
    window.parent.postMessage(Object.assign({ isStreamlitMessage: true, type: type }, payload), "*");
  }

  function onRender(event) {
    if (!event.data || event.data.type !== "streamlit:render") return;
    var args = event.data.args || {};
    var action = args.action;
    var token  = args.token || "";

    if (action === "read") {
      var stored = "";
      try { stored = localStorage.getItem(KEY) || ""; } catch (e) {}
      send("streamlit:setComponentValue", { value: stored });

    } else if (action === "write" && token) {
      try { localStorage.setItem(KEY, token); } catch (e) {}
      send("streamlit:setComponentValue", { value: "ok" });

    } else if (action === "clear") {
      try { localStorage.removeItem(KEY); } catch (e) {}
      send("streamlit:setComponentValue", { value: "ok" });

    } else {
      send("streamlit:setComponentValue", { value: "" });
    }
  }

  window.addEventListener("message", onRender);
  send("streamlit:componentReady", { apiVersion: 1 });
})();
</script>
</body>
</html>
